<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /><title>Recorder Worker</title></head>
<body>
<!--
  recorder-worker.html — Hidden window that runs actual MediaRecorder
  Main process sends IPC: recorder:start / recorder:stop
  Worker captures screen + mic, records in 30s segments, uploads each segment
-->
<script>
let mediaRecorder = null;
let stream        = null;
let recordingId   = null;
let segStartTime  = null;
let segmentIndex  = 0;

const SEGMENT_MS  = 30_000; // 30-second segments

// ── Listen for start/stop commands from main ──────────────────────────────────
window.electronAPI.onRecordStart(async ({ recordingId: recId }) => {
  recordingId  = recId;
  segmentIndex = 0;
  await startCapture();
});

window.electronAPI.onRecordStop(() => {
  stopCapture();
});

// ── Screen + mic capture ──────────────────────────────────────────────────────
async function startCapture() {
  try {
    // Get screen sources from main process
    const sources = await window.electronAPI.getScreenSources();
    const screen  = sources.find(s => s.name === "Entire Screen") || sources[0];
    if (!screen) { console.error("No screen source found"); return; }

    // Capture screen (video only from desktopCapturer)
    const screenStream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        mandatory: {
          chromeMediaSource:   "desktop",
          chromeMediaSourceId: screen.id,
          maxWidth:  1920,
          maxHeight: 1080,
          maxFrameRate: 15,
        }
      }
    });

    // Capture microphone audio separately
    let audioStream = null;
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) {
      console.warn("Mic capture failed:", e.message);
    }

    // Combine tracks
    const tracks = [...screenStream.getVideoTracks()];
    if (audioStream) tracks.push(...audioStream.getAudioTracks());
    stream = new MediaStream(tracks);

    startSegment();
  } catch (err) {
    console.error("startCapture error:", err.message);
  }
}

function startSegment() {
  if (!stream) return;
  segStartTime = new Date().toISOString();
  const chunks = [];

  mediaRecorder = new MediaRecorder(stream, {
    mimeType: "video/webm;codecs=vp8,opus",
    videoBitsPerSecond: 800_000,  // 800 kbps — good balance for classroom
    audioBitsPerSecond:  64_000,
  });

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    if (chunks.length === 0) return;
    const blob   = new Blob(chunks, { type: "video/webm" });
    const buffer = await blob.arrayBuffer();
    const result = await window.electronAPI.uploadSegment(buffer, {
      recordingId,
      segmentIndex: segmentIndex++,
      startTime:    segStartTime,
      endTime:      new Date().toISOString(),
      duration:     SEGMENT_MS / 1000,
    });
    console.log("Segment uploaded:", result);
  };

  mediaRecorder.start();

  // Auto-split every SEGMENT_MS
  setTimeout(() => {
    if (mediaRecorder?.state === "recording") {
      mediaRecorder.stop();
      // Start next segment if still recording
      setTimeout(() => { if (stream?.active) startSegment(); }, 200);
    }
  }, SEGMENT_MS);
}

function stopCapture() {
  if (mediaRecorder?.state === "recording") mediaRecorder.stop();
  stream?.getTracks().forEach(t => t.stop());
  stream = null;
  mediaRecorder = null;
}
</script>
</body>
</html>
