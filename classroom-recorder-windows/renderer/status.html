<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EduCampus Recorder — Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; font-size: 13px; }

    .header { padding: 18px 20px 14px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 12px; }
    .logo   { font-size: 22px; }
    .header h1 { font-size: 16px; font-weight: 800; color: #f1f5f9; }
    .header p  { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* Status indicator */
    .status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: #1e293b; border-bottom: 1px solid #334155; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: #22c55e; animation: pulse 2s infinite; }
    .dot.red    { background: #ef4444; animation: pulse .8s infinite; }
    .dot.gray   { background: #64748b; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .status-text { font-size: 12px; color: #94a3b8; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Recording panel */
    .rec-panel { margin: 14px 16px; background: #1e293b; border-radius: 14px; overflow: hidden; }
    .rec-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
    .rec-label  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #64748b; }
    .rec-badge  { font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 20px; }
    .rec-badge.live     { background: #ef4444; color: #fff; animation: pulse .8s infinite; }
    .rec-badge.standby  { background: #334155; color: #94a3b8; }

    .rec-info { padding: 0 16px 16px; }
    .rec-info p { font-size: 12px; color: #cbd5e1; margin-bottom: 4px; }

    .btn-row { display: flex; gap: 10px; padding: 0 16px 16px; }
    .btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: .15s; }
    .btn-start { background: #22c55e; color: #fff; }
    .btn-start:hover  { background: #16a34a; }
    .btn-stop  { background: #ef4444; color: #fff; }
    .btn-stop:hover   { background: #b91c1c; }
    .btn-gray  { background: #334155; color: #94a3b8; }

    /* Schedule */
    .section { margin: 0 16px 14px; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 8px; }
    .class-item { background: #1e293b; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .class-dot  { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; }
    .class-dot.now { background: #ef4444; animation: pulse .8s infinite; }
    .class-name { font-size: 12px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .class-time { font-size: 10px; color: #64748b; font-family: monospace; white-space: nowrap; margin-left: auto; }
    .empty-schedule { text-align: center; padding: 20px; color: #475569; font-size: 12px; }

    /* Config strip */
    .config-strip { margin: 0 16px 16px; background: #1e293b; border-radius: 10px; padding: 10px 14px; font-size: 11px; color: #475569; line-height: 2; }
    .config-strip strong { color: #64748b; }

    /* Log */
    .log { margin: 0 16px 16px; background: #020617; border-radius: 10px; padding: 10px 14px; height: 80px; overflow-y: auto; font-size: 10px; color: #475569; font-family: monospace; }
    .log-line { margin-bottom: 2px; }
    .log-line.ok   { color: #22c55e; }
    .log-line.warn { color: #f59e0b; }
    .log-line.err  { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🎬</span>
    <div>
      <h1>EduCampus Recorder</h1>
      <p id="roomBreadcrumb">Loading…</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot gray" id="statusDot"></div>
    <span class="status-text" id="statusText">Connecting…</span>
  </div>

  <!-- Recording control -->
  <div class="rec-panel">
    <div class="rec-header">
      <span class="rec-label">Recording</span>
      <span class="rec-badge standby" id="recBadge">STANDBY</span>
    </div>
    <div class="rec-info" id="recInfo">
      <p>No active recording</p>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="btnStart" onclick="manualStart()">▶ Start</button>
      <button class="btn btn-stop"  id="btnStop"  onclick="manualStop()" disabled>⏹ Stop</button>
    </div>
  </div>

  <!-- Today's schedule -->
  <div class="section">
    <div class="section-title">Today's Schedule</div>
    <div id="scheduleList"><div class="empty-schedule">Loading schedule…</div></div>
  </div>

  <!-- Config -->
  <div class="config-strip" id="configStrip">Loading config…</div>

  <!-- Log -->
  <div class="log" id="log"></div>

<script>
let schedule = [];
let isRec    = false;

// Load config
window.onload = async () => {
  const campus     = await window.electronAPI.getStore("campus");
  const block      = await window.electronAPI.getStore("block");
  const floor      = await window.electronAPI.getStore("floor");
  const roomNumber = await window.electronAPI.getStore("roomNumber");
  const roomName   = await window.electronAPI.getStore("roomName");
  const apiUrl     = await window.electronAPI.getStore("apiUrl");

  const parts = [campus, block, floor, roomNumber].filter(Boolean);
  document.getElementById("roomBreadcrumb").textContent = parts.join(" › ");
  document.getElementById("configStrip").innerHTML =
    `<strong>Room:</strong> ${roomName || roomNumber} &nbsp;|&nbsp; <strong>API:</strong> ${apiUrl}`;

  // Current recording state
  const state = await window.electronAPI.getState();
  updateRecUI(state.isRecording, state.recordingId);
};

// Status updates
window.electronAPI.onStatus(msg => {
  document.getElementById("statusText").textContent = msg;
  const dot = document.getElementById("statusDot");
  dot.className = "dot " + (msg.includes("error") || msg.includes("Error") ? "gray" : isRec ? "red" : "green");
  addLog(msg);
});

// Schedule updates
window.electronAPI.onSchedule(data => {
  schedule = data || [];
  renderSchedule();
});

// Record start/stop from main
window.electronAPI.onRecordStart(({ recordingId }) => updateRecUI(true, recordingId));
window.electronAPI.onRecordStop(() => updateRecUI(false, null));

function updateRecUI(recording, recId) {
  isRec = recording;
  const badge   = document.getElementById("recBadge");
  const info    = document.getElementById("recInfo");
  const btnSt   = document.getElementById("btnStart");
  const btnSp   = document.getElementById("btnStop");
  const dot     = document.getElementById("statusDot");

  badge.textContent = recording ? "● LIVE" : "STANDBY";
  badge.className   = "rec-badge " + (recording ? "live" : "standby");
  info.innerHTML    = recording
    ? `<p>🔴 Recording in progress</p><p style="font-size:10px;color:#64748b;">ID: ${recId || "–"}</p>`
    : `<p>No active recording</p>`;
  btnSt.disabled = recording;
  btnSp.disabled = !recording;
  dot.className  = "dot " + (recording ? "red" : "green");
}

function renderSchedule() {
  const el   = document.getElementById("scheduleList");
  const now  = new Date();
  const hhmm = now.toTimeString().slice(0, 5);
  const today= now.toISOString().slice(0, 10);

  const todayItems = schedule.filter(s => (s.start || "").slice(0, 10) === today);
  if (todayItems.length === 0) {
    el.innerHTML = '<div class="empty-schedule">No classes scheduled today</div>';
    return;
  }
  el.innerHTML = todayItems.map(item => {
    const start   = (item.start || "").slice(11, 16);
    const end     = (item.end   || "").slice(11, 16);
    const isNow   = hhmm >= start && hhmm < end;
    return `<div class="class-item">
      <div class="class-dot ${isNow ? 'now' : ''}"></div>
      <span class="class-name">${item.title || item.meetingId}</span>
      <span class="class-time">${start}–${end}</span>
    </div>`;
  }).join("");
}

async function manualStart() {
  const recId = prompt("Enter Meeting/Class ID to record (leave blank for manual):");
  const result = await window.electronAPI.startRecording(recId || "manual-" + Date.now());
  addLog(result.ok ? "Manual recording started" : "Error: " + result.error, result.ok ? "ok" : "err");
}

async function manualStop() {
  const result = await window.electronAPI.stopRecording();
  addLog(result.ok ? "Recording stopped" : "Error: " + result.error, result.ok ? "ok" : "err");
}

function addLog(msg, type = "") {
  const log  = document.getElementById("log");
  const time = new Date().toTimeString().slice(0, 8);
  const line = document.createElement("div");
  line.className = "log-line " + type;
  line.textContent = `[${time}] ${msg}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
  // keep max 50 lines
  while (log.children.length > 50) log.removeChild(log.firstChild);
}

// Refresh schedule every minute
setInterval(renderSchedule, 60_000);
</script>
</body>
</html>
